<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Klassenarbeit planen</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --panel: #ffffff;
      --ink: #17202a;
      --muted: #5d6d7e;
      --line: #d6dde5;
      --line-strong: #b8c2cc;
      --primary: #1f5f8b;
      --primary-dark: #164768;
      --primary-soft: #e9f3fb;
      --ok-bg: #eaf6ef;
      --ok: #1f6f43;
      --warn-bg: #fff5dc;
      --warn: #8a5b00;
      --error-bg: #fdecec;
      --error: #9b1c1c;
      --calc-bg: #f1f4f7;
      --shadow: 0 8px 26px rgba(23,32,42,.08);
      --radius: 16px;
    }
    * { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      color: var(--ink);
      background: linear-gradient(180deg, #eef4f8 0%, var(--bg) 210px);
      font-size: 16px;
      line-height: 1.35;
    }
    main {
      width: min(1120px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 28px 0 44px;
    }
    header {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: end;
      margin-bottom: 18px;
    }
    h1 {
      margin: 0 0 6px;
      font-size: clamp(30px, 4vw, 44px);
      letter-spacing: -0.035em;
      line-height: 1.05;
    }
    .lead { margin: 0; color: var(--muted); max-width: 760px; }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; justify-content: flex-end; }
    button {
      appearance: none;
      border: 0;
      border-radius: 999px;
      padding: 12px 16px;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      color: white;
      background: var(--primary);
      box-shadow: 0 2px 8px rgba(31,95,139,.24);
    }
    button:hover { background: var(--primary-dark); }
    button.secondary { color: var(--primary-dark); background: var(--primary-soft); box-shadow: none; }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      margin-bottom: 16px;
    }
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 18px 12px;
      border-bottom: 1px solid var(--line);
      background: #fbfcfd;
    }
    h2 {
      margin: 0;
      font-size: 20px;
      letter-spacing: -0.015em;
    }
    .small { font-size: 13px; color: var(--muted); }
    .body { padding: 16px 18px 18px; }
    .meta-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      margin-bottom: 14px;
    }
    .field-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }
    .field-row:last-child { margin-bottom: 0; }
    .field-row .field { margin-bottom: 0; }
    .field-row--narrow-second { grid-template-columns: 2fr 1fr; }
    .field-row--3col { grid-template-columns: 1fr 1fr 1fr; }
    .field-row--work { grid-template-columns: .25fr 1.75fr 1fr; }
    .field { margin-bottom: 12px; }
    .field:last-child { margin-bottom: 0; }
    label {
      display: block;
      font-size: 13px;
      font-weight: 800;
      color: #34495e;
      margin: 0 0 6px;
    }
    input, select {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--line-strong);
      border-radius: 10px;
      padding: 9px 11px;
      font: inherit;
      background: white;
      color: var(--ink);
    }
    #className { text-transform: uppercase; }
    #className::placeholder { text-transform: none; }
    #className.invalid { border-color: var(--error); }
    #subjectSelect:invalid { color: var(--muted); }
    #courseSelect:invalid { color: var(--muted); }
    .hint.error { color: var(--error); }
    input:focus, select:focus, button:focus {
      outline: 3px solid rgba(31,95,139,.22);
      outline-offset: 2px;
    }
    select:disabled, input[readonly] {
      background: var(--calc-bg);
      color: #34495e;
      border-color: var(--line);
      opacity: 1;
      -webkit-text-fill-color: #34495e;
    }
    .hint { margin-top: 5px; font-size: 12px; color: var(--muted); }
    .schema-pill {
      display: inline-flex;
      align-items: center;
      padding: 6px 10px;
      border-radius: 999px;
      background: var(--primary-soft);
      color: var(--primary-dark);
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }
    .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th, td { padding: 10px 8px; border-bottom: 1px solid var(--line); text-align: left; vertical-align: middle; }
    th { font-size: 12px; text-transform: uppercase; letter-spacing: .04em; color: #50677c; background: #fbfcfd; }
    td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; white-space: nowrap; }
    tr.major td { font-weight: 800; background: #fcfdfe; }
    .indent-1 { padding-left: 24px; color: #263645; }
    .indent-2 { padding-left: 42px; color: #4c5f70; }
    .indent-3 { padding-left: 60px; color: #6b7f92; }
    .muted { color: var(--muted); }
    .two-col { display: grid; grid-template-columns: 1.25fr .85fr; gap: 16px; align-items: start; }
    .print-only { display: none; }
    @media (max-width: 860px) {
      main { width: min(100vw - 20px, 720px); padding-top: 18px; }
      header { grid-template-columns: 1fr; align-items: start; }
      .actions { justify-content: flex-start; }
      .meta-grid, .two-col, .field-row { grid-template-columns: 1fr; }
      .card-header { align-items: flex-start; flex-direction: column; }
    }
    @media print {
      @page { size: A4 portrait; margin: 10mm; }
      body { background: white; font-size: 11px; color: #111; }
      main { width: 100%; padding: 0; }
      header { margin-bottom: 8px; }
      h1 { font-size: 24px; margin-bottom: 2px; }
      .lead, .actions, .no-print, button { display: none !important; }
      .print-only { display: block; }
      .card { box-shadow: none; border-color: #b8c2cc; margin-bottom: 8px; break-inside: avoid; }
      .card-header { padding: 8px 10px; background: #f8f8f8; }
      .body { padding: 10px; }
      .meta-grid { gap: 8px; margin-bottom: 8px; }
      .field-row { gap: 8px; margin-bottom: 8px; }
      .two-col { grid-template-columns: 1.22fr .78fr; gap: 8px; }
      input, select { min-height: 28px; padding: 4px 6px; border-color: #bbb; background: #fff; font-size: 11px; }
      .hint { font-size: 10px; }
      h2 { font-size: 14px; }
      table { font-size: 10.2px; }
      th, td { padding: 4px 5px; }
    }
    #loginOverlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.55);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000;
    }
    #loginCard {
      background: white;
      border-radius: var(--radius);
      box-shadow: 0 20px 60px rgba(0,0,0,.3);
      padding: 32px;
      width: min(380px, calc(100vw - 40px));
    }
    #loginCard h2 { margin: 0 0 18px; }
    #loginError { margin-top: 12px; font-size: 13px; font-weight: 700; color: var(--error); }
    .logo-login { display: block; max-width: 100%; height: auto; margin: 0 auto 18px; }
    .logo-header { display: block; height: 40px; width: auto; margin-bottom: 6px; }
  </style>
</head>
<body>

  <div id="loginOverlay">
  <div id="loginCard">
    <img src="logo" alt="" class="logo-login">
    <h2>Anmelden</h2>
    <div class="field">
      <label for="loginUser">Benutzername</label>
      <input id="loginUser" type="text" autocomplete="username">
    </div>
    <div class="field">
      <label for="loginPass">Passwort</label>
      <input id="loginPass" type="password" autocomplete="current-password">
    </div>
    <button type="button" id="loginBtn" style="width:100%">Anmelden</button>
    <div id="loginError"></div>
  </div>
</div>

<main style="display:none">
  <header>
    <div>
      <img src="logo" alt="" class="logo-header">
      <h1>Klassenarbeit planen</h1>
    </div>
    <div class="actions no-print">
      <button type="button" class="secondary" id="printBtn">Drucken / PDF sichern</button>
    </div>
  </header>

  <section class="card">
    <div class="card-header">
      <h2>Klassenarbeit festlegen</h2>
      <span id="schemaLabel" class="schema-pill">Standardschema</span>
    </div>
    <div class="body">
      <div class="meta-grid">
        <div class="field-row field-row--3col">
          <div class="field">
            <label for="className">Klasse</label>
            <input id="className" type="text" placeholder="z. B. 7a" value="7a" maxlength="3">
            <div id="classNameHint" class="hint">Jahrgang 5–10, optional Lerngruppen A–F</div>
          </div>
          <div class="field">
            <label for="subjectSelect">Fach</label>
            <select id="subjectSelect" required autocomplete="off">
              <option value="" selected disabled>Fach wählen</option>
              <option value="englisch">Englisch</option>
              <option value="deutsch">Deutsch</option>
            </select>
          </div>
          <div class="field">
            <label for="courseSelect">Kursart</label>
            <select id="courseSelect" required>
              <option value="GK" selected>GK</option>
              <option value="EK">EK</option>
            </select>
          </div>
        </div>
        <div class="field-row field-row--work">
          <div class="field">
            <label for="workNumberSelect">Nr.</label>
            <select id="workNumberSelect">
              <option value="1" selected>1</option>
              <option value="2">2</option>
              <option value="3">3</option>
              <option value="4">4</option>
              <option value="5">5</option>
              <option value="6">6</option>
            </select>
          </div>
          <div class="field">
            <label for="topicText">Thema</label>
            <input id="topicText" type="text" placeholder="Thema der Klassenarbeit">
          </div>
          <div class="field">
            <label for="dateText">Datum</label>
            <input id="dateText" type="date" lang="de-DE">
          </div>
        </div>
      </div>

      <div class="field-row field-row--narrow-second">
        <div class="field">
          <label for="specSelect">Was möchten Sie vorgeben?</label>
          <select id="specSelect"></select>
        </div>
        <div class="field">
          <label for="pointsInput">Punktzahl</label>
          <input id="pointsInput" type="number" inputmode="numeric" min="0" step="1" value="50">
          <div id="allowedHint" class="hint"></div>
        </div>
      </div>
    </div>
  </section>

  <div class="two-col">
    <section class="card">
      <div class="card-header"><h2>Punkteverteilung</h2></div>
      <div class="body table-wrap">
        <table aria-label="Punkteverteilung">
          <thead><tr><th>Bereich</th><th class="num">Punkte</th></tr></thead>
          <tbody id="distributionBody"></tbody>
        </table>
      </div>
    </section>

    <section class="card">
      <div class="card-header"><h2>Notengrenzen</h2></div>
      <div class="body table-wrap">
        <table aria-label="Notengrenzen">
          <thead><tr><th>Note</th><th class="num">Punktbereich</th></tr></thead>
          <tbody id="gradesBody"></tbody>
        </table>
      </div>
    </section>
  </div>
</main>

<script>
(function(){
  'use strict';

  // Set to true to re-enable the login screen (kept in place, just inactive for now).
  const LOGIN_ENABLED = false;

  const GRADE_LIMITS = [
    {note:'sehr gut', pct:87},
    {note:'gut', pct:73},
    {note:'befriedigend', pct:59},
    {note:'ausreichend', pct:45},
    {note:'mangelhaft', pct:19},
    {note:'ungenügend', pct:0}
  ];

  const els = {};
  function $(id){ return document.getElementById(id); }

  // ── shared ────────────────────────────────────────────────────────────────

  // Ties (equal remainders) are broken by each part's `priority`
  // (lower wins the extra point first), per the Priorisierung guidance;
  // parts without an explicit priority fall back to their array position.
  function largestRemainder(total, parts){
    const rows = parts.map((p, idx) => {
      const num = total * p.weight;
      const floor = Math.floor(num / 100);
      const rem = num % 100;
      return Object.assign({}, p, {ideal: num / 100, points: floor, remainder: rem, order: idx});
    });
    let missing = total - rows.reduce((s,r) => s + r.points, 0);
    rows.slice().sort((a,b) => (b.remainder - a.remainder) || ((a.priority ?? a.order) - (b.priority ?? b.order))).forEach(r => {
      if (missing > 0) { rows[r.order].points += 1; missing -= 1; }
    });
    return rows;
  }

  function addDeviation(split){
    return split.reduce((s,r) => s + Math.abs(r.points - r.ideal), 0);
  }

  function roundHalfDownPercent(total, pct){
    const num = Number(total) * pct;
    const q = Math.floor(num / 100);
    const r = num % 100;
    return r > 50 ? q + 1 : q;
  }

  function gradeRows(total){
    total = Number(total);
    if (total === 0) return GRADE_LIMITS.map(g => ({note:g.note, min:0, range:'–'}));
    const mins = GRADE_LIMITS.map(g => roundHalfDownPercent(total, g.pct));
    const ranges = [];
    for (let i = 0; i < GRADE_LIMITS.length; i++) {
      let lo, hi;
      if (i === 0) { lo = mins[i]; hi = total; }
      else { lo = mins[i]; hi = mins[i-1] - 1; }
      let range;
      if (lo > hi) range = 'kein eigener Punktbereich';
      else if (lo === hi) range = String(lo);
      else range = lo + '–' + hi;
      ranges.push({note:GRADE_LIMITS[i].note, min:mins[i], lo, hi, range});
    }
    return ranges;
  }

  function escapeHtml(s){
    return String(s).replace(/[&<>"]/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[ch]));
  }

  function genericSolver(year, course, spec, inputPoints, calcFn, compValFn, specWeightFn, maxAllowedFn, validCourseFn){
    inputPoints = Number(inputPoints);
    if (!validCourseFn(year, course)) return {valid:false, reason:'course'};
    if (!Number.isInteger(inputPoints) || inputPoints < 0) return {valid:false, reason:'integer'};
    const maxAllowed = maxAllowedFn(year, course, spec);
    if (inputPoints > maxAllowed) return {valid:false, reason:'tooHigh', maxAllowed};
    if (spec === 'total') {
      return {valid:true, exact:true, total:inputPoints, actual:inputPoints, maxAllowed, dist:calcFn(year, course, inputPoints)};
    }
    const w = specWeightFn(year, course, spec);
    const idealTotal = w === 0 ? 0 : inputPoints * 100 / w;
    const candidates = [];
    for (let total = 0; total <= 150; total++) {
      const dist = calcFn(year, course, total);
      const actual = compValFn(dist, spec);
      candidates.push({
        total, actual, dist,
        exact: actual === inputPoints,
        pointDiff: Math.abs(actual - inputPoints),
        idealDiff: Math.abs(total - idealTotal),
        dev: dist.aggregateDeviation
      });
    }
    const exacts = candidates.filter(c => c.exact);
    const pool = exacts.length ? exacts : candidates;
    pool.sort((a,b) => {
      if (!exacts.length && a.pointDiff !== b.pointDiff) return a.pointDiff - b.pointDiff;
      if (a.idealDiff !== b.idealDiff) return a.idealDiff - b.idealDiff;
      if (Math.abs(a.dev - b.dev) > 1e-9) return a.dev - b.dev;
      return a.total - b.total;
    });
    const best = pool[0];
    return {valid:true, exact:best.exact, total:best.total, actual:best.actual, maxAllowed, dist:best.dist, pointDiff:best.pointDiff};
  }

  // ── Englisch ──────────────────────────────────────────────────────────────

  function isYearWithoutCourseEn(year){ return Number(year) <= 6; }

  function normalizeCourseEn(year, course){
    if (isYearWithoutCourseEn(year)) return 'NONE';
    return (course === 'GK' || course === 'EK') ? course : '';
  }

  function isValidCourseEn(year, course){ return isYearWithoutCourseEn(year) || course === 'GK' || course === 'EK'; }

  function isSpecialSchemaEn(year, course){ return (Number(year) === 9 || Number(year) === 10) && course === 'EK'; }

  function schemaNameEn(year, course){
    return isSpecialSchemaEn(year, course) ? 'Sonderschema Jahrgang 9/10 EK' : 'Standardschema';
  }

  function mainWeightsEn(year, course){
    year = Number(year);
    if (year === 5 || year === 6) return [30,25,45];
    if (year === 7 || year === 8) return [25,25,50];
    if ((year === 9 || year === 10) && course === 'EK') return [20,20,60];
    if (year === 9 || year === 10) return [30,25,45];
    return null;
  }

  function calculateDistributionEn(year, course, total){
    year = Number(year); total = Number(total); course = normalizeCourseEn(year, course);
    const weights = mainWeightsEn(year, course);
    if (!weights) return null;
    const main = largestRemainder(total, [
      {key:'k1', label:'Kompetenz 1: Listening / Reading / Mediation', weight:weights[0], level:0, priority:1},
      {key:'k2', label:'Kompetenz 2: Verfügen über sprachliche Mittel', weight:weights[1], level:0, priority:2},
      {key:'k3', label:'Kompetenz 3: Schreiben', weight:weights[2], level:0, priority:0}
    ]);
    const k1 = main[0].points, k2 = main[1].points, k3 = main[2].points;
    const write = largestRemainder(k3, [
      {key:'content', label:'Inhaltliche Leistung', weight:40, level:1, priority:0},
      {key:'presentation', label:'Darstellungsleistung', weight:60, level:1, priority:1}
    ]);
    const content = write[0].points, presentation = write[1].points;
    const special = isSpecialSchemaEn(year, course);
    const presentationParts = special ? [
      {key:'expression', label:'Ausdrucksvermögen', weight:35, level:2, priority:1},
      {key:'communication', label:'Kommunikative Textgestaltung', weight:35, level:2, priority:2},
      {key:'correctness', label:'Sprachliche Korrektheit', weight:30, level:2, priority:0}
    ] : [
      {key:'exprcomm', label:'Ausdrucksvermögen und kommunikative Textgestaltung', weight:65, level:2, priority:1},
      {key:'correctness', label:'Sprachliche Korrektheit', weight:35, level:2, priority:0}
    ];
    const pres = largestRemainder(presentation, presentationParts);
    const correctness = pres.find(r => r.key === 'correctness').points;
    const corr = largestRemainder(correctness, [
      {key:'orthography', label:'Orthographie', weight:20, level:2, priority:2},
      {key:'grammar', label:'Grammatik', weight:40, level:2, priority:0},
      {key:'vocabulary', label:'Wortschatz', weight:40, level:2, priority:1}
    ]);
    const rows = [];
    function row(label, points, level, major){ rows.push({label, points, level, major: !!major}); }
    row(main[0].label, k1, 0, true);
    row(main[1].label, k2, 0, true);
    row(main[2].label, k3, 0, true);
    row('Inhaltliche Leistung', content, 1, false);
    row('Darstellungsleistung', presentation, 1, false);
    pres.forEach(r => row(r.label, r.points, 2, false));
    corr.forEach(r => row(r.label, r.points, 3, false));
    const dev = addDeviation(main) + addDeviation(write) + addDeviation(pres) + addDeviation(corr);
    const values = {total, k1, k2, k3, content, presentation, correctness};
    pres.forEach(r => values[r.key] = r.points);
    corr.forEach(r => values[r.key] = r.points);
    return {year, course, special, schema:schemaNameEn(year, course), rows, values, aggregateDeviation:dev};
  }

  function componentValueEn(dist, spec){
    if (spec === 'k1') return dist.values.k1;
    if (spec === 'k2') return dist.values.k2;
    if (spec === 'k3') return dist.values.k3;
    return dist.values.total;
  }

  function specWeightEn(year, course, spec){
    const weights = mainWeightsEn(year, normalizeCourseEn(year, course));
    if (!weights) return 100;
    if (spec === 'k1') return weights[0];
    if (spec === 'k2') return weights[1];
    if (spec === 'k3') return weights[2];
    return 100;
  }

  function getMaxAllowedEn(year, course, spec){
    if (spec === 'total') return 150;
    course = normalizeCourseEn(year, course);
    if (!isValidCourseEn(year, course)) return 0;
    let max = 0;
    for (let total = 0; total <= 150; total++) {
      const dist = calculateDistributionEn(year, course, total);
      max = Math.max(max, componentValueEn(dist, spec));
    }
    return max;
  }

  function solveTotalEn(year, course, spec, inputPoints){
    return genericSolver(
      year, normalizeCourseEn(year, course), spec, inputPoints,
      calculateDistributionEn, componentValueEn, specWeightEn, getMaxAllowedEn,
      isValidCourseEn
    );
  }

  // ── Deutsch ───────────────────────────────────────────────────────────────

  function isYearWithoutCourseDe(year){ return Number(year) <= 8; }

  function normalizeCourseDe(year, course){
    if (isYearWithoutCourseDe(year)) return 'NONE';
    return (course === 'GK' || course === 'EK') ? course : '';
  }

  function isValidCourseDe(year, course){ return isYearWithoutCourseDe(year) || course === 'GK' || course === 'EK'; }

  function isSpecialSchemaDe(year, course){ return (Number(year) === 9 || Number(year) === 10) && course === 'EK'; }

  function schemaNameDe(year, course){
    return isSpecialSchemaDe(year, course) ? 'Sonderschema Jahrgang 9/10 EK' : 'Standardschema';
  }

  function deutschWeights(year, course){
    if (isSpecialSchemaDe(year, course)) {
      return {
        vorb:20, aufg:80, inh:70, darst:30,
        darst_subs:[
          {key:'struktur',        label:'Struktur',                weight:16, level:2, priority:1},
          {key:'syntax',          label:'Syntax',                  weight:16, level:2, priority:0},
          {key:'ausdruck',        label:'Ausdruck',                weight:12, level:2, priority:2},
          {key:'spr_richtigkeit', label:'Sprachliche Richtigkeit', weight:44, level:2, priority:4},
          {key:'indiv',           label:'Individuelles Kriterium', weight:12, level:2, priority:3}
        ]
      };
    }
    return {
      vorb:25, aufg:75, inh:80, darst:20,
      darst_subs:[
        {key:'struktur',        label:'Struktur',                weight:16, level:2, priority:1},
        {key:'syntax',          label:'Syntax',                  weight:16, level:2, priority:0},
        {key:'ausdruck',        label:'Ausdruck',                weight:16, level:2, priority:2},
        {key:'spr_richtigkeit', label:'Sprachliche Richtigkeit', weight:44, level:2, priority:4},
        {key:'indiv',           label:'Individuelles Kriterium', weight: 8, level:2, priority:3}
      ]
    };
  }

  function calculateDistributionDe(year, course, total){
    year = Number(year); total = Number(total); course = normalizeCourseDe(year, course);
    const w = deutschWeights(year, course);
    const main = largestRemainder(total, [
      {key:'vorb', label:'1. Vorbereitende Aufgaben', weight:w.vorb, level:0, priority:1},
      {key:'aufg', label:'2. Aufgabentyp nach KLP',  weight:w.aufg, level:0, priority:0}
    ]);
    const vorb = main[0].points, aufg = main[1].points;
    const aufgParts = largestRemainder(aufg, [
      {key:'inh',   label:'Inhaltliche Leistung', weight:w.inh,   level:1, priority:1},
      {key:'darst', label:'Darstellungsleistung', weight:w.darst, level:1, priority:0}
    ]);
    const inh = aufgParts[0].points, darst = aufgParts[1].points;
    const darstParts = largestRemainder(darst, w.darst_subs);
    const rows = [];
    function row(label, points, level, major){ rows.push({label, points, level, major: !!major}); }
    row(main[0].label, vorb, 0, true);
    row(main[1].label, aufg, 0, true);
    row('Inhaltliche Leistung', inh, 1, false);
    row('Darstellungsleistung', darst, 1, false);
    darstParts.forEach(r => row(r.label, r.points, 2, false));
    const dev = addDeviation(main) + addDeviation(aufgParts) + addDeviation(darstParts);
    const values = {total, vorb, aufg, inh, darst};
    darstParts.forEach(r => values[r.key] = r.points);
    return {year, course, special:isSpecialSchemaDe(year, course), schema:schemaNameDe(year, course), rows, values, aggregateDeviation:dev};
  }

  function componentValueDe(dist, spec){
    if (spec === 'vorb') return dist.values.vorb;
    if (spec === 'aufg') return dist.values.aufg;
    return dist.values.total;
  }

  function specWeightDe(year, course, spec){
    const w = deutschWeights(year, normalizeCourseDe(year, course));
    if (spec === 'vorb') return w.vorb;
    if (spec === 'aufg') return w.aufg;
    return 100;
  }

  function getMaxAllowedDe(year, course, spec){
    if (spec === 'total') return 150;
    course = normalizeCourseDe(year, course);
    if (!isValidCourseDe(year, course)) return 0;
    let max = 0;
    for (let total = 0; total <= 150; total++) {
      const dist = calculateDistributionDe(year, course, total);
      max = Math.max(max, componentValueDe(dist, spec));
    }
    return max;
  }

  function solveTotalDe(year, course, spec, inputPoints){
    return genericSolver(
      year, normalizeCourseDe(year, course), spec, inputPoints,
      calculateDistributionDe, componentValueDe, specWeightDe, getMaxAllowedDe,
      isValidCourseDe
    );
  }

  // ── UI ────────────────────────────────────────────────────────────────────

  function currentSubject(){ return els.subjectSelect.value; }

  // Keeps className to a valid Jahrgang (5–10) optionally followed by one letter A–F;
  // a letter is only accepted once a valid Jahrgang has been typed.
  function sanitizeClassName(raw){
    let digits = '';
    let letter = '';
    for (const ch of raw) {
      if (letter) break;
      if (/[0-9]/.test(ch)) {
        if (digits === '1' && ch === '0') digits = '10';
        else if (digits === '' && '56789'.includes(ch)) digits = ch;
        else if (digits === '' && ch === '1') digits = '1';
      } else if (/[a-fA-F]/.test(ch) && ['5','6','7','8','9','10'].includes(digits)) {
        letter = ch;
      }
    }
    return digits + letter;
  }

  // Returns the Jahrgang as a number, or null while the digits typed so far
  // (e.g. a lone "1") don't yet form a valid 5–10 Jahrgang.
  function currentYear(){
    const m = els.className.value.match(/^\d+/);
    const digits = m ? m[0] : '';
    return ['5','6','7','8','9','10'].includes(digits) ? Number(digits) : null;
  }

  function updateClassNameValidity(year){
    const invalid = year === null && els.className.value !== '';
    els.className.classList.toggle('invalid', invalid);
    els.classNameHint.classList.toggle('error', invalid);
    els.classNameHint.textContent = invalid
      ? 'Ungültiger Jahrgang – bitte auf 5–10 korrigieren (z. B. „10")'
      : 'Jahrgang 5–10, optional Lerngruppen A–F';
  }

  function updateCourseOptions(){
    const year = currentYear();
    const subject = currentSubject();
    const noCourseFn = subject === 'deutsch' ? isYearWithoutCourseDe : isYearWithoutCourseEn;
    const current = els.courseSelect.value;
    els.courseSelect.innerHTML = '';
    if (noCourseFn(year)) {
      const opt = document.createElement('option');
      opt.value = 'NONE';
      opt.textContent = 'Keine Kursart erforderlich';
      els.courseSelect.appendChild(opt);
      els.courseSelect.disabled = true;
    } else {
      const placeholder = document.createElement('option');
      placeholder.value = ''; placeholder.disabled = true;
      placeholder.textContent = 'Kursart wählen';
      els.courseSelect.appendChild(placeholder);
      ['GK','EK'].forEach(v => {
        const opt = document.createElement('option');
        opt.value = v; opt.textContent = v;
        els.courseSelect.appendChild(opt);
      });
      els.courseSelect.disabled = false;
      els.courseSelect.value = (current === 'GK' || current === 'EK') ? current : '';
    }
  }

  function updateSpecOptions(){
    const subject = currentSubject();
    const current = els.specSelect.value;
    const opts = subject === 'deutsch'
      ? [
          {value:'total', label:'Gesamtpunktzahl'},
          {value:'vorb',  label:'1. Vorbereitende Aufgaben'},
          {value:'aufg',  label:'2. Aufgabentyp nach KLP'}
        ]
      : [
          {value:'total', label:'Gesamtpunktzahl'},
          {value:'k1',    label:'Kompetenz 1: Listening / Reading / Mediation'},
          {value:'k2',    label:'Kompetenz 2: Verfügen über sprachliche Mittel'},
          {value:'k3',    label:'Kompetenz 3: Schreiben'}
        ];
    els.specSelect.innerHTML = '';
    opts.forEach(o => {
      const opt = document.createElement('option');
      opt.value = o.value; opt.textContent = o.label;
      els.specSelect.appendChild(opt);
    });
    const validValues = opts.map(o => o.value);
    els.specSelect.value = validValues.includes(current) ? current : 'total';
  }

  function renderDistribution(dist){
    els.distributionBody.innerHTML = dist.rows.map(r => {
      const cls = (r.major ? 'major ' : '') + (r.level ? 'indent-' + r.level : '');
      return '<tr class="' + (r.major ? 'major' : '') + '"><td class="' + cls + '">' + escapeHtml(r.label) + '</td><td class="num">' + r.points + '</td></tr>';
    }).join('');
  }

  function renderGrades(total){
    els.gradesBody.innerHTML = gradeRows(total).map(r => '<tr><td>' + escapeHtml(r.note) + '</td><td class="num">' + escapeHtml(r.range) + '</td></tr>').join('');
  }

  function setPointsMessage(msg){
    els.allowedHint.textContent = msg;
    els.allowedHint.classList.toggle('error', !!msg);
  }

  function calculate(){
    const subject = currentSubject();
    els.courseSelect.disabled = !subject;
    if (!subject) {
      els.courseSelect.innerHTML = '<option value="" selected disabled>–</option>';
    }
    const year = currentYear();
    updateClassNameValidity(year);
    if (year === null) {
      els.schemaLabel.textContent = '–';
      setPointsMessage(els.className.value === '' ? '' : 'Bitte gültigen Jahrgang eingeben, um fortzufahren.');
      renderDistribution({rows:[]}); renderGrades(0);
      return;
    }
    if (!subject) {
      els.schemaLabel.textContent = '–';
      setPointsMessage('Bitte Fach wählen, um fortzufahren.');
      renderDistribution({rows:[]}); renderGrades(0);
      return;
    }
    updateCourseOptions();
    const rawCourse = els.courseSelect.value;
    if (rawCourse === '') {
      els.schemaLabel.textContent = '–';
      setPointsMessage('Bitte Kursart wählen, um fortzufahren.');
      renderDistribution({rows:[]}); renderGrades(0);
      return;
    }
    const spec = els.specSelect.value;
    const raw = els.pointsInput.value;
    const points = Number(raw);

    const normFn   = subject === 'deutsch' ? normalizeCourseDe  : normalizeCourseEn;
    const solveFn  = subject === 'deutsch' ? solveTotalDe        : solveTotalEn;
    const schemaFn = subject === 'deutsch' ? schemaNameDe        : schemaNameEn;

    const course = normFn(year, rawCourse);
    els.schemaLabel.textContent = schemaFn(year, course);
    setPointsMessage(points > 150 ? 'Maximal 150 Punkte zulässig.' : '');

    if (raw === '' || !Number.isInteger(points) || points < 0) {
      renderDistribution({rows:[]}); renderGrades(0);
      return;
    }
    const solved = solveFn(year, rawCourse, spec, points);
    if (!solved.valid) {
      renderDistribution({rows:[]}); renderGrades(0);
      return;
    }
    renderDistribution(solved.dist);
    renderGrades(solved.total);
  }

  function handleLogin(){
    if ($('loginUser').value === 'lehrer' && $('loginPass').value === 'Lenkerbeck') {
      $('loginOverlay').style.display = 'none';
      document.querySelector('main').style.display = 'block';
      init();
    } else {
      $('loginError').textContent = 'Benutzername oder Passwort falsch.';
    }
  }

  function init(){
    ['className','classNameHint','subjectSelect','courseSelect','specSelect','pointsInput','allowedHint','distributionBody','gradesBody','schemaLabel'].forEach(id => els[id] = $(id));
    els.subjectSelect.value = ''; // browsers may restore a previous selection on reload; force the placeholder
    updateSpecOptions();
    els.subjectSelect.addEventListener('change', () => { updateSpecOptions(); calculate(); });
    ['courseSelect','specSelect','pointsInput'].forEach(id => els[id].addEventListener('change', calculate));
    els.className.addEventListener('input', () => {
      els.className.value = sanitizeClassName(els.className.value);
      calculate();
    });
    els.pointsInput.addEventListener('input', calculate);
    $('printBtn').addEventListener('click', () => { calculate(); window.print(); });
    calculate();
  }

  window.__plannerTest = {
    largestRemainder, gradeRows,
    en: {calculateDistribution:calculateDistributionEn, solveTotal:solveTotalEn, getMaxAllowed:getMaxAllowedEn, normalizeCourse:normalizeCourseEn, isSpecialSchema:isSpecialSchemaEn, mainWeights:mainWeightsEn},
    de: {calculateDistribution:calculateDistributionDe, solveTotal:solveTotalDe, getMaxAllowed:getMaxAllowedDe, normalizeCourse:normalizeCourseDe, isSpecialSchema:isSpecialSchemaDe, deutschWeights}
  };
  document.addEventListener('DOMContentLoaded', () => {
    if (!LOGIN_ENABLED) {
      $('loginOverlay').style.display = 'none';
      document.querySelector('main').style.display = 'block';
      init();
      return;
    }
    $('loginBtn').addEventListener('click', handleLogin);
    $('loginPass').addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
    $('loginUser').addEventListener('keydown', e => { if (e.key === 'Enter') $('loginPass').focus(); });
  });
})();
</script>
