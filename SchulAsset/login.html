<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SchulAsset — Login</title>
  <link rel="stylesheet" href="login.css">
</head>
<body>

  <div class="login-card">

    <!-- App header -->
    <div class="login-header">
      <img src="mlks_logo.png" class="school-logo" alt="Martin-Luther-King-Schule">
      <div class="login-divider"></div>
      <h1 class="app-title">SchulAsset</h1>
      <p class="app-subtitle" data-i18n="login.subtitle">iPad-Verwaltung</p>
    </div>

    <!-- Language switcher -->
    <div class="lang-switcher">
      <button class="lang-btn" data-lang="de" onclick="setLang('de')">DE</button>
      <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
      <button class="lang-btn" data-lang="tr" onclick="setLang('tr')">TR</button>
    </div>

    <!-- Login form -->
    <form id="login-form" onsubmit="handleLogin(event)" novalidate>

      <div class="form-group">
        <label for="username" data-i18n="login.usernameLabel">E-Mail oder Seriennummer</label>
        <input
          type="text"
          id="username"
          autocomplete="username"
          spellcheck="false"
          autocapitalize="none"
          data-i18n-placeholder="login.usernamePlaceholder"
          placeholder="E-Mail oder Seriennummer"
          required
        >
        <p class="field-hint" data-i18n="login.usernameHint">
          Lehrkräfte: E-Mail-Adresse · Schüler / Eltern: Seriennummer
        </p>
      </div>

      <div class="form-group">
        <label for="password" data-i18n="login.passwordLabel">Passwort</label>
        <input
          type="password"
          id="password"
          autocomplete="current-password"
          required
        >
      </div>

      <!-- Error message (hidden until needed) -->
      <div id="error-msg" class="error-msg" hidden></div>

      <button type="submit" id="login-btn" class="login-btn">
        <span data-i18n="login.loginButton">Anmelden</span>
      </button>

      <div style="text-align:center;margin-top:0.75rem">
        <button type="button" class="btn-forgot-link" onclick="showForgotForm()">
          Passwort vergessen?
        </button>
      </div>

    </form>

    <!-- Forgot password form (admin only) -->
    <div id="forgot-section" hidden>
      <p style="font-size:0.85rem;color:var(--text-secondary,#6b7280);margin-bottom:1.25rem;text-align:center">
        Gib deine Admin-E-Mail-Adresse ein. Du erhältst einen Reset-Link.
      </p>
      <div class="form-group">
        <label for="reset-email">E-Mail-Adresse</label>
        <input type="email" id="reset-email" autocomplete="email" placeholder="admin@schule.de">
      </div>
      <div id="reset-msg" class="error-msg" hidden></div>
      <button type="button" class="login-btn" onclick="handleForgotPassword()">
        Reset-Link senden
      </button>
      <div style="text-align:center;margin-top:0.75rem">
        <button type="button" class="btn-forgot-link" onclick="showLoginForm()">← Zurück zum Login</button>
      </div>
    </div>

    <!-- New password form (shown after clicking the email reset link) -->
    <div id="new-password-section" hidden>
      <p style="font-size:0.85rem;color:var(--text-secondary,#6b7280);margin-bottom:1.25rem;text-align:center">
        Wähle ein neues Passwort für deinen Admin-Account.
      </p>
      <div class="form-group">
        <label for="new-password">Neues Passwort</label>
        <input type="password" id="new-password" autocomplete="new-password">
      </div>
      <div id="new-pw-msg" class="error-msg" hidden></div>
      <button type="button" class="login-btn" onclick="handleNewPassword()">
        Passwort speichern
      </button>
    </div>

  </div>

  <!-- Supabase JS client (CDN) — must come before our own scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <!-- Our files, in dependency order -->
  <script src="supabase-client.js"></script>
  <script src="translations.js"></script>
  <script src="auth.js"></script>
  <script>
    // Apply translations on first load (language is read from localStorage or defaults to 'de').
    applyTranslations();
  </script>

</body>
</html>
