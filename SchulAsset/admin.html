<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SchulAsset — Admin</title>
  <link rel="stylesheet" href="admin.css">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>

  <div class="app-layout">

    <!-- Sidebar overlay (mobile only — tap to close) -->
    <div id="sidebar-overlay" class="sidebar-overlay" onclick="closeSidebar()"></div>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="brand-mark">
          <span class="dot dot-teal"></span>
          <span class="dot dot-orange"></span>
          <span class="dot dot-navy"></span>
        </div>
        <span class="sidebar-title">SchulAsset</span>
        <!-- Close button visible only on mobile -->
        <button class="sidebar-close" onclick="closeSidebar()" aria-label="Menü schließen">
          <i data-lucide="x" style="width:18px;height:18px;"></i>
        </button>
      </div>

      <nav class="sidebar-nav">
        <a href="#schnellsuche" class="nav-item" data-view="schnellsuche" onclick="closeSidebar()">
          <i data-lucide="search" class="nav-icon"></i> Schnellsuche
        </a>
        <a href="#ipads" class="nav-item" data-view="ipads" onclick="closeSidebar()">
          <i data-lucide="tablet" class="nav-icon"></i> iPads
        </a>
        <a href="#pupils" class="nav-item" data-view="pupils" onclick="closeSidebar()">
          <i data-lucide="users" class="nav-icon"></i> Schüler
        </a>
        <a href="#staff" class="nav-item" data-view="staff" onclick="closeSidebar()">
          <i data-lucide="user-check" class="nav-icon"></i> Lehrkräfte
        </a>
        <a href="#meldungen" class="nav-item" data-view="meldungen" onclick="closeSidebar()">
          <i data-lucide="inbox" class="nav-icon"></i> Pending
        </a>
        <a href="#activity" class="nav-item" data-view="activity" onclick="closeSidebar()">
          <i data-lucide="clock" class="nav-icon"></i> Last activity
        </a>
      </nav>

      <div class="sidebar-footer">
        <span id="user-email" class="user-email"></span>
        <button onclick="logout()" class="logout-btn">Abmelden</button>
      </div>
    </aside>

    <!-- Main content area -->
    <main class="main-content">

      <!-- Mobile top bar (hidden on desktop) -->
      <div class="mobile-topbar">
        <button class="hamburger" onclick="openSidebar()" aria-label="Menü öffnen">
          <span></span><span></span><span></span>
        </button>
        <span class="mobile-title">SchulAsset</span>
      </div>

      <div id="view-container"></div>
    </main>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pizzip@3.1.7/dist/pizzip.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docxtemplater@3.44.0/build/docxtemplater.js"></script>
  <script src="https://unpkg.com/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script src="supabase-client.js"></script>
  <script src="translations.js"></script>
  <script src="doc-generator.js"></script>
  <script src="admin.js"></script>
  <script src="views/ipad-list.js"></script>
  <script src="views/ipad-detail.js"></script>
  <script src="views/pupil-list.js"></script>
  <script src="views/schnellsuche.js"></script>
  <script src="views/staff-list.js"></script>
  <script src="views/meldungen.js"></script>
  <script src="views/activity.js"></script>
  <script src="views/pupil-detail.js"></script>
  <script src="views/staff-detail.js"></script>
  <script>lucide.createIcons(); initAdmin();</script>

</body>
</html>
